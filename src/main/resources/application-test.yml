spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          # 카카오 설정 (https://developers.kakao.com 에서 앱 생성 후 발급)
          kakao:
            client-id: ${KAKAO_CLIENT_ID:0aa8ea802538108605e5f35f87f2b971}
            client-secret: ${KAKAO_CLIENT_SECRET:ZVyzY0pPl83Gaq9xk5g9jvdz4wgGn3Is}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao

          # 네이버 설정 (https://developers.naver.com 에서 앱 생성 후 발급)
          naver:
            client-id: ${NAVER_CLIENT_ID:72UsVjkEvRHW3XabyH9J}
            client-secret: ${NAVER_CLIENT_SECRET:9OlNWO4Nyp}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: ZGV2LWdyZWVucGF0aC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2Yml0cw==
  access-token-validity-seconds: 1800 # 30분
  refresh-token-validity-seconds: 1209600 # 14일

frontend:
  url: http://localhost:3000

cors:
  allowed-origins: http://localhost:3000


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
